name: Build Custom MaixPy Firmware

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: 1. 拉取代码 (包含子模块)
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: 2. 安装环境依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake wget python3 python3-pip git
        pip3 install intelhex

    - name: 3. 下载 K210 编译工具链
      run: |
        wget https://github.com/kendryte/kendryte-gnu-toolchain/releases/download/v8.2.0-20190409/kendryte-toolchain-ubuntu-amd64-8.2.0-20190409.tar.xz
        sudo tar -Jxf kendryte-toolchain-ubuntu-amd64-8.2.0-20190409.tar.xz -C /opt
        echo "/opt/kendryte-toolchain/bin" >> $GITHUB_PATH

    - name: 4. 编译 MaixPy 固件
      run: |
        cd projects/maixpy_k210
        python3 project.py clean
        python3 project.py build

    - name: 5. 提取并上传生成的 Bin 文件
      uses: actions/upload-artifact@v4
      with:
        name: Custom_MaixPy_Firmware
        path: projects/maixpy_k210/build/*.bin
